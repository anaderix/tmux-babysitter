monitoring_interval_ms = 500  # Check every 500ms for faster response

[tmux]
session = "my-session"
window = "my-window"  # Optional, defaults to first window
pane = "0"             # Optional, defaults to first pane

[llm]
base_url = "http://localhost:11434/v1"  # For Ollama
model = "llama3.2"                      # Or use a fast small model
api_key = "ollama"

[guard_rails]
# Default to "no" for safety - if uncertain, refuse
default_response = "no"

# ============================================================================
# DANGEROUS DESTRUCTIVE OPERATIONS - ALWAYS SAY NO
# ============================================================================

[[guard_rails.rules]]
name = "file_delete"
description = "Asks confirmation to delete, remove, or erase files or directories"
response = "no"

[[guard_rails.rules]]
name = "recursive_delete"
description = "Asks to recursively delete directories (rm -rf, delete -r, etc.)"
response = "no"

[[guard_rails.rules]]
name = "disk_format"
description = "Asks to format, wipe, or erase disk drives or partitions"
response = "no"

[[guard_rails.rules]]
name = "disk_erase"
description = "Asks to securely erase or zero out disks"
response = "no"

[[guard_rails.rules]]
name = "partition_delete"
description = "Asks to delete disk partitions"
response = "no"

# ============================================================================
# DATA DESTRUCTION
# ============================================================================

[[guard_rails.rules]]
name = "database_drop"
description = "Asks to drop, delete, or truncate databases or tables"
response = "no"

[[guard_rails.rules]]
name = "database_wipe"
description = "Asks to clear, empty, or truncate tables with data"
response = "no"

[[guard_rails.rules]]
name = "backup_delete"
description = "Asks to delete backups or archive files"
response = "no"

[[guard_rails.rules]]
