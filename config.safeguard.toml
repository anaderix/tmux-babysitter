# ============================================================================
# VERSION CONTROL DESTRUCTIVE ACTIONS
# ============================================================================

[[guard_rails.rules]]
name = "git_force_delete_branch"
description = "Asks to force delete a git branch that might have unpushed work"
response = "no"

[[guard_rails.rules]]
name = "git_reset_hard"
description = "Asks to perform git reset --hard, which discards uncommitted changes"
response = "no"

[[guard_rails.rules]]
name = "git_force_push"
description = "Asks to force push to remote, which overwrites remote history"
response = "no"

[[guard_rails.rules]]
name = "git_amend_public"
description = "Asks to amend already-pushed commits, which rewrites history"
response = "no"

[[guard_rails.rules]]
name = "git_clean_force"
description = "Asks to run git clean with force, removing untracked files"
response = "no"

