monitoring_interval_ms = 1000  # Check every second

[rapid_response]
enabled = true           # Enable rapid response mode after sending an answer
interval_ms = 200        # Wait 200ms between burst checks
count = 5               # Perform 5 rapid checks (total window: ~800ms)

[tmux]
session = "my-session"
window = "my-window"  # Optional, defaults to first window
pane = "0"             # Optional, defaults to first pane

[llm]
base_url = "http://localhost:11434/v1"  # For Ollama, or use OpenAI API
model = "llama3.2"                      # Or "gpt-4o-mini", etc.
api_key = "ollama"                      # Required by some APIs

[guard_rails]
default_response = "no"  # Default to safe option

[[guard_rails.rules]]
name = "continue_confirmation"
description = "Asks if user wants to continue with a process"
response = "yes"

[[guard_rails.rules]]
name = "file_overwrite"
description = "Asks permission to overwrite files"
response = "no"

[[guard_rails.rules]]
name = "package_installation"
description = "Asks to install dependencies"
response = "yes"

[[guard_rails.rules]]
name = "destructive_operation"
description = "Asks confirmation for destructive operations (delete, remove, etc.)"
response = "no"

[[guard_rails.rules]]
name = "menu_select_first"
description = "A numbered menu where first option is Yes/Proceed/Continue"
response = "1"

[[guard_rails.rules]]
name = "menu_select_second"
description = "A numbered menu where second option is correct (e.g., No, or Yes Always)"
response = "2"

[[guard_rails.rules]]
name = "menu_select_third"
description = "A numbered menu where third option is correct choice"
response = "3"

[[guard_rails.rules]]
name = "menu_yes"
description = "A numbered menu where Yes is the correct option (usually position 1)"
response = "1"

[[guard_rails.rules]]
name = "menu_no"
description = "A numbered menu where No is the correct option (usually position 2)"
response = "2"

[[guard_rails.rules]]
name = "menu_always"
description = "A numbered menu with Yes/Yes Always/No - select Yes Always (usually position 2)"
response = "2"

[[guard_rails.rules]]
name = "generic_proceed"
description = "A generic numbered menu asking to proceed (e.g., \"Do you want to proceed?\") where context is unclear"
response = "1"

